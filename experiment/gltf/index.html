title: ''
subtitle: glTF Viewer Demo
share-title: glTF Viewer Demo
share-description: A demonstration of Google's model-viewer web component
image: https://vorth.github.io/vzome-sharing/experiment/gltf/5BrunnVenn.png
---

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />    
  
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <script type="module" src="https://www.vzome.com/modules/gltf-viewer.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/x_ite@14.1.5/dist/x_ite.min.js"></script>

    <style>
x3d-canvas {
  width: 768px;
  height: 432px;
}
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <figure style="width: 87%; margin: 5%">
          <x3d-canvas xrSessionMode="immersive-ar"
        contentScale="auto"
        update="auto"
        src="./dodec-rotations.gltf"></x3d-canvas>
    </figure>

    <figure style="width: 87%; margin: 5%">
      <model-viewer alt="Sample glTF file" src="./pink-hyperdo.gltf" scale="0.001 0.001 0.001"
      
  ar
  ar-modes="webxr scene-viewer"
  environment-image="neutral"
  skybox-image=""
  style="background-color: transparent;height:500px; width:800px;"

      camera-controls touch-action="pan-y" >
      </model-viewer>
      <figcaption style="text-align: center; font-style: italic;">
        Sample model loaded as a glTF file, using Google's viewer
      </figcaption>
    </figure>

    <figure style="width: 87%; margin: 5%">
      <model-viewer alt="Sample glTF file" src="./dodec-rotations.gltf" 
      
  ar
  ar-modes="webxr scene-viewer"
  environment-image="neutral"
  skybox-image=""
  style="background-color: transparent;height:500px; width:800px;"
  
  camera-controls touch-action="pan-y" >
      </model-viewer>
      <figcaption style="text-align: center; font-style: italic;">
        Sample model loaded as a glTF file, using Google's viewer
      </figcaption>
    </figure>

    <figure style="width: 87%; margin: 5%">
      <gltf-viewer src="./dodec-rotations.gltf" style="height:500px; width:800px;">
      </gltf-viewer>
      <figcaption style="text-align: center; font-style: italic;">
        Sample model loaded as a glTF file, using vZome's gltf-viewer
      </figcaption>
    </figure>


  </body>
</html>
